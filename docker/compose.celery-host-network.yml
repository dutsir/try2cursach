# Подключать вместе с основным файлом, когда Amnezia (или другой VPN) поднят на ХОСТЕ VPS,
# чтобы парсер в celery-worker использовал те же маршруты и выходной IP, что и VPN.
#
#   docker compose -f docker-compose.yml -f docker/compose.celery-host-network.yml up -d
#
# Сервисы postgres/rabbit/redis должны публиковать порты на хост (как в основном compose).
# Веб и beat остаются в bridge-сети и по-прежнему ходят в postgres по имени сервиса.

services:
  celery-worker:
    network_mode: host
    environment:
      DB_HOST: 127.0.0.1
      RABBITMQ_HOST: 127.0.0.1
      REDIS_HOST: 127.0.0.1
